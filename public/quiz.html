<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quizzas • Quiz</title>
  <link rel="stylesheet" href="/public/assets/css/styles.css" />
</head>

<body class="page-quiz">
  <header class="nav">
    <div class="brand">
      <img src="/public/assets/img/logo.png" alt="Quizzas logo" />
      <div class="brandText">
        <div class="brandName">Quizzas</div>
        <div class="brandTag">Quiz • Practice mode</div>
      </div>
    </div>

    <nav class="navLinks" aria-label="Primary">
      <a href="/public/index.html">Home</a>
      <a class="active" href="/public/quiz.html">Quiz</a>
      <a href="/public/about.html">About</a>
      <a href="/public/admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="quizTop">
        <div>
          <h2 class="qTitle" id="quizTopic">Choose a topic</h2>
          <p class="muted" id="quizHint" style="margin:6px 0 0 0;">Select a topic, then start.</p>
        </div>

        <div style="min-width:260px;">
          <label for="topicPick">Topic</label>
          <select id="topicPick"></select>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn" type="button">Start</button>
          <button id="nextBtn" class="btn secondary" type="button" disabled>Next</button>
        </div>
      </div>
    </section>

    <section class="card" id="questionCard" style="display:none;">
      <h3 id="questionText" style="margin:0 0 10px 0;"></h3>
      <div id="choices" class="choiceList"></div>
      <div id="feedback" class="msg"></div>
    </section>

    <footer class="footer">
      <div>© <span id="year"></span> Quizzas</div>
      <div class="muted">Good luck.</div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/public/js/quiz.js"></script>
</body>
</html>
