<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Quizzas · Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="/public/assets/css/styles.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/public/js/config.js"></script>
</head>

<body>
  <header class="nav">
    <div class="brand">
      <!-- ✅ LOGO FIXED HERE -->
      <img class="brandLogo" src="/public/assets/img/logo.png" alt="Quizzas logo">

      <div class="brandText">
        <div class="brandName">Quizzas</div>
        <div class="brandTag">Admin · Manage topics & questions</div>
      </div>
    </div>

    <nav class="navLinks" aria-label="Primary">
      <a href="/public/index.html">Home</a>
      <a href="/public/quiz.html">Quiz</a>
      <a href="/public/about.html">About</a>
      <a class="active" href="/public/admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">

    <!-- STATUS -->
    <section class="card">
      <p class="muted">
        Log in if you already have an account. New users can sign up below.
      </p>

      <div class="stats">
        <div class="stat">
          <div class="statLabel">Session</div>
          <div class="statValue" id="sessionText">—</div>
        </div>
        <div class="stat">
          <div class="statLabel">Role</div>
          <div class="statValue" id="roleText">—</div>
        </div>
      </div>

      <p id="globalMsg" class="msg"></p>
    </section>

    <!-- AUTH -->
    <section id="authSection" class="card">
      <h2>Log in / Sign up</h2>

      <div class="formGrid">
        <div>
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>

        <div>
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
      </div>

      <div class="actions">
        <button id="loginBtn" class="btn" type="button">Log in</button>
        <button id="signupBtn" class="btn secondary" type="button">Sign up</button>
        <!-- Hidden by default; JS shows only when logged in -->
        <button
          id="logoutBtn"
          class="btn ghost"
          type="button"
          style="display:none;"
        >
          Log out
        </button>
      </div>

      <p id="authMsg" class="msg"></p>
    </section>

    <!-- ADMIN ACTIONS -->
    <section id="adminSection" class="card" style="display:none;">
      <h2>Admin Actions</h2>

      <!-- CREATE TOPIC -->
      <div class="adminBlock">
        <h3>Create topic</h3>
        <div class="row">
          <input id="newTopicName" placeholder="Topic name" />
          <button id="createTopicBtn" class="btn" type="button">
            Create topic
          </button>
        </div>
        <p id="topicMsg" class="msg"></p>
      </div>

      <!-- ADD QUESTION -->
      <div class="adminBlock">
        <h3>Add question</h3>

        <div class="row">
          <select id="topicSelect"></select>
          <input id="questionText" placeholder="Question text" />
          <input
            id="explanationText"
            placeholder="Explanation (optional)"
          />
        </div>

        <div class="row">
          <input id="optA" placeholder="Option A" />
          <input id="optB" placeholder="Option B" />
          <input id="optC" placeholder="Option C" />
          <input id="optD" placeholder="Option D" />
        </div>

        <div class="row">
          <label for="correctSelect" class="inlineLabel">
            Correct option
          </label>

          <select id="correctSelect">
            <option value="0">A</option>
            <option value="1">B</option>
            <option value="2">C</option>
            <option value="3">D</option>
          </select>

          <button id="addQuestionBtn" class="btn" type="button">
            Add question
          </button>
        </div>

        <p id="questionMsg" class="msg"></p>
      </div>
    </section>

  </main>

  <footer class="footer">
    © <span id="yearAdmin"></span> Quizzas · Admin access protected by Supabase
  </footer>

  <script src="/public/js/admin.js"></script>
</body>
</html>
