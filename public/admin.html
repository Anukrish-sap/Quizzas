<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quizzas • Admin</title>
  <link rel="stylesheet" href="/public/assets/css/styles.css" />
</head>

<body class="page-admin">
  <header class="nav">
    <div class="brand">
      <img src="/public/assets/img/logo.png" alt="Quizzas logo" />
      <div class="brandText">
        <div class="brandName">Quizzas</div>
        <div class="brandTag">Admin • Manage topics &amp; questions</div>
      </div>
    </div>

    <nav class="navLinks" aria-label="Primary">
      <a href="/public/index.html">Home</a>
      <a href="/public/quiz.html">Quiz</a>
      <a href="/public/about.html">About</a>
      <a class="active" href="/public/admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <!-- AUTH (HIDDEN AFTER LOGIN) -->
    <section id="authCard" class="card">
      <p class="muted" style="margin:0 0 14px 0;">
        Log in if you already have an account. New users can sign up below.
      </p>

      <h2 style="margin:0 0 10px 0;">Log in / Sign up</h2>

      <div class="formGrid">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <div class="actions">
        <button id="loginBtn" class="btn" type="button">Log in</button>
        <button id="signupBtn" class="btn secondary" type="button">Sign up</button>
      </div>

      <div id="authMsg" class="msg" aria-live="polite" style="margin-top:12px;"></div>
      <div id="jsError" class="msg" style="margin-top:10px;"></div>
    </section>

    <!-- SESSION + LOGOUT (VISIBLE AFTER LOGIN) -->
    <section id="sessionCard" class="card" style="display:none;">
      <div class="stats" style="align-items:center;">
        <div class="stat">
          <div class="statLabel">Session</div>
          <div class="statValue" id="sessionText">—</div>
        </div>
        <div class="stat">
          <div class="statLabel">Role</div>
          <div class="statValue" id="roleText">—</div>
        </div>

        <div style="margin-left:auto;">
          <button id="logoutBtn" class="btn ghost" type="button">Log out</button>
        </div>
      </div>
    </section>

    <!-- ADMIN ACTIONS (VISIBLE AFTER LOGIN) -->
    <section id="adminActions" class="card" style="display:none;">
      <h2 style="margin:0 0 10px 0;">Admin Actions</h2>

      <h3 style="margin:0 0 10px 0;">Topics</h3>
      <div class="row" style="grid-template-columns: 1fr 220px;">
        <input id="topicName" type="text" placeholder="New topic name" />
        <button id="createTopicBtn" class="btn" type="button">Create topic</button>
      </div>
      <div id="topicMsg" class="msg"></div>

      <div class="row" style="grid-template-columns: 1fr 220px; margin-top:10px;">
        <select id="topicSelect"></select>
        <button id="deleteTopicBtn" class="btn secondary" type="button">Delete topic</button>
      </div>
      <div id="deleteTopicMsg" class="msg"></div>

      <hr style="border:0; height:1px; background:rgba(160,220,160,0.18); margin:18px 0;">

      <h3 style="margin:0 0 10px 0;">Add question</h3>
      <div class="row" style="grid-template-columns: 260px 1fr 1fr;">
        <select id="topicSelectForQuestion"></select>
        <input id="questionText" type="text" placeholder="Question text" />
        <input id="explanation" type="text" placeholder="Explanation (optional)" />
      </div>

      <div class="row" style="grid-template-columns: repeat(4, minmax(0, 1fr));">
        <input id="optA" type="text" placeholder="Option A" />
        <input id="optB" type="text" placeholder="Option B" />
        <input id="optC" type="text" placeholder="Option C" />
        <input id="optD" type="text" placeholder="Option D" />
      </div>

      <div class="row" style="grid-template-columns:auto 140px auto; align-items:center;">
        <span class="muted">Correct option</span>
        <select id="correctOpt">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>
        <button id="addQuestionBtn" class="btn" type="button">Add question</button>
      </div>
      <div id="questionMsg" class="msg"></div>

      <hr style="border:0; height:1px; background:rgba(160,220,160,0.18); margin:18px 0;">

      <h3 style="margin:0 0 10px 0;">Delete question</h3>
      <div class="row" style="grid-template-columns: 260px 1fr 220px;">
        <select id="topicSelectForDeleteQ"></select>
        <select id="questionSelect"></select>
        <button id="deleteQuestionBtn" class="btn secondary" type="button">Delete question</button>
      </div>
      <div id="deleteQuestionMsg" class="msg"></div>
    </section>

    <footer class="footer">
      <div>© <span id="year"></span> Quizzas</div>
      <div class="muted">Quizzas • Admin access protected by Supabase</div>
    </footer>
  </main>

  <script>
    window.addEventListener("error", (e) => {
      const box = document.getElementById("jsError");
      if (box) {
        box.textContent = "❌ JS Error: " + (e.message || "unknown");
        box.style.color = "red";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      const box = document.getElementById("jsError");
      if (box) {
        box.textContent = "❌ Promise Error: " + (e.reason?.message || e.reason || "unknown");
        box.style.color = "red";
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/public/js/admin.js?v=2" defer></script>
</body>
</html>
